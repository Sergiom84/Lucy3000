# CANAL CENTRAL WEB/PWA (2026-05-31): modelo vigente para Supabase compartido.
# La DATABASE_URL vive solo en lucy3000-api; clientes web/PWA/Electron remoto
# consumen la API publica con VITE_API_URL/LUCY3000_API_URL.
# Servicios ya creados (cuenta sergio.hlara84, workspace tea-d8dlksh9rddc73a25e50):
#   API  srv-d8dlmoojs32c73fmfee0  https://lucy3000-2hnv.onrender.com
#   web  srv-d8dlqkvavr4c73ft9kl0  https://lucy3000-web.onrender.com
#
# Blueprint de Render para Lucy3000.
# Despliega dos servicios desde este repo:
#   - lucy3000-api : API central Express + Prisma (consume el PostgreSQL de Supabase).
#   - lucy3000-web : front React/Vite servido como sitio estatico (PWA), con SPA fallback.
#
# Secretos (sync:false) se rellenan en el dashboard de Render, no se versionan:
#   - DATABASE_URL    : cadena Session Pooler de Supabase (postgres...:pass@...pooler...:5432/postgres?sslmode=require)
#   - BOOTSTRAP_TOKEN : token para crear el primer platform admin (POST /api/auth/bootstrap-admin)
#   - RESEND_API_KEY  : clave de Resend para recibir solicitudes de prueba por email
#   - PASSWORD_RESET_BASE_URL : URL publica del front para enlaces de recuperacion
#   - VITE_API_URL    : URL publica de lucy3000-api (se conoce tras el primer deploy de la API)

services:
  - type: web
    name: lucy3000-api
    runtime: node
    repo: https://github.com/Sergiom84/Lucy3000
    branch: master
    region: frankfurt
    plan: starter
    healthCheckPath: /health
    buildCommand: npm install && npm run prisma:generate && npm run build:backend
    preDeployCommand: npx prisma migrate deploy
    startCommand: node dist/backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: BOOTSTRAP_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TRIAL_REQUEST_TO
        value: sergiohernandezlara07@gmail.com
      - key: TRIAL_REQUEST_FROM
        value: Lucy3000 <onboarding@resend.dev>
      - key: PASSWORD_RESET_BASE_URL
        value: https://lucy3000-web.onrender.com
      - key: PASSWORD_RESET_FROM
        value: Lucy3000 <onboarding@resend.dev>
      # Origenes permitidos para CORS (separados por coma). Las peticiones sin
      # cabecera Origin (Electron, healthchecks) pasan siempre.
      - key: CORS_ORIGINS
        value: https://lucy3000-web.onrender.com

  - type: web
    name: lucy3000-web
    runtime: static
    repo: https://github.com/Sergiom84/Lucy3000
    branch: master
    buildCommand: npm install && npm run build:web
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache
